# ne-plain — ví dụ cấu hình (sửa ifname/MAC/CIDR cho đúng máy)
# Chạy từ thư mục gốc ne-plain để đường dẫn bpf mặc định hợp lệ.

global_frame_size=4096
global_batch_size=64

# Đường dẫn object BPF (tương đối cwd)
bpf_local=bpf/xdp_redirect.o
bpf_wan=bpf/xdp_wan_redirect.o

# LAN (AF_XDP + XDP redirect từ driver)
local0_ifname=eth0
local0_cidr=192.168.182.10/24
local0_src_mac=00:11:22:33:44:55
# local0_umem_mb=512
# local0_ring_size=4096

# WAN uplink
wan0_ifname=eth1
# 0 = không ARP động peer, dùng dst_mac trong cfg / static
wan0_dst_ip=0
wan0_src_mac=aa:bb:cc:dd:ee:01
wan0_dst_mac=aa:bb:cc:dd:ee:02
wan0_window_kb=2048

# Thêm WAN thứ hai (nếu có):
# wan1_ifname=eth2
# wan1_dst_ip=10.0.0.1
# wan1_src_mac=...
# wan1_dst_mac=...
# wan1_window_kb=2048
